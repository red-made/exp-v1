<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melodic Dictation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1a1a1a;
      --border: #222;
      --accent: #7c6ff7;
      --accent-dim: #4a45a0;
      --text: #e8e8e8;
      --muted: #666;
      --radius: 10px;
      --green: #4be89a;
      --yellow: #e8c34b;
      --red: #e84b4b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 272px 1fr;
      grid-template-rows: auto 1fr auto;
    }

    header {
      grid-column: 1 / -1;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header a { color: var(--muted); text-decoration: none; font-size: 0.82rem; transition: color 0.15s; }
    header a:hover { color: var(--text); }
    header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.01em; }

    aside {
      border-right: 1px solid var(--border);
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      overflow-y: auto;
    }

    .cfg-section { display: flex; flex-direction: column; gap: 10px; }

    .cfg-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      font-weight: 600;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }

    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .dual-range-wrap { position: relative; height: 28px; }
    .dual-range-track {
      position: absolute;
      top: 50%; left: 0; right: 0;
      transform: translateY(-50%);
      height: 4px;
      background: var(--border);
      border-radius: 2px;
    }
    .dual-range-fill {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      height: 4px;
      background: var(--accent);
      border-radius: 2px;
    }
    .dual-range-wrap input[type=range] {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      pointer-events: none;
    }
    .dual-range-wrap input[type=range]::-webkit-slider-thumb { pointer-events: all; }

    .btn-group { display: flex; gap: 5px; }
    .btn-group button {
      flex: 1;
      padding: 7px 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-group button.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--text);
    }
    .btn-group button:hover:not(.active) { border-color: #444; color: var(--text); }

    .tonic-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
    }
    .tonic-grid button {
      padding: 5px 2px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-size: 0.68rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tonic-grid button.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--text);
    }
    .tonic-grid button:hover:not(.active) { border-color: #444; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
    }
    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent-dim); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: var(--accent); }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      gap: 24px;
    }

    .start-screen {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .start-screen h2 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
    .start-screen p { color: var(--muted); font-size: 0.88rem; max-width: 300px; line-height: 1.6; }

    .progress-row {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .progress-text { font-size: 0.75rem; color: var(--muted); }

    .note-card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .btn-play {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(124,111,247,0.35);
    }
    .btn-play:hover { transform: scale(1.06); background: #9088f9; }
    .btn-play:active { transform: scale(0.94); }
    .btn-play.playing { animation: pulse 0.6s ease; }
    @keyframes pulse { 0%,100% { box-shadow: 0 4px 20px rgba(124,111,247,0.35); } 50% { box-shadow: 0 4px 32px rgba(124,111,247,0.7); } }

    .note-display {
      font-size: 3.6rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      min-height: 1.15em;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .note-display.hidden { font-size: 2.4rem; color: var(--border); }

    .btn-reveal {
      padding: 7px 18px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-reveal:hover { border-color: var(--accent-dim); color: var(--text); }

    .tuner-card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .tuner-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); font-weight: 600; align-self: flex-start; }
    #tuner-canvas { display: block; }
    .tuner-cents {
      font-size: 0.85rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      min-height: 1.2em;
    }

    .controls {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 480px;
    }
    .btn-action {
      flex: 1;
      padding: 11px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-action:hover:not(:disabled) { border-color: var(--accent-dim); }
    .btn-action.primary { background: var(--accent); border-color: var(--accent); }
    .btn-action.primary:hover { background: #9088f9; border-color: #9088f9; }
    .btn-action:disabled { opacity: 0.38; cursor: not-allowed; }

    .seq-display {
      width: 100%; max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .seq-dots { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .seq-dot {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--surface2); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700; color: var(--muted);
      transition: background 0.25s, border-color 0.25s, box-shadow 0.25s, color 0.25s;
    }
    .seq-dot.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 18px rgba(124,111,247,0.55); }

    .proximity-list {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      min-height: 30px; align-items: center;
    }
    .prox-chip {
      padding: 4px 11px; border-radius: 20px;
      font-size: 0.8rem; font-weight: 600; font-variant-numeric: tabular-nums;
      border: 1px solid; transition: all 0.15s;
    }
    .prox-chip.green  { color: var(--green);  border-color: rgba(75,232,154,0.35); background: rgba(75,232,154,0.09); }
    .prox-chip.yellow { color: var(--yellow); border-color: rgba(232,195,75,0.35); background: rgba(232,195,75,0.09); }
    .prox-chip.red    { color: var(--red);    border-color: rgba(232,75,75,0.35);  background: rgba(232,75,75,0.09); }

    .answer-section {
      width: 100%; max-width: 480px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px 22px; display: flex; flex-direction: column; gap: 10px;
    }
    .answer-hint { font-size: 0.72rem; color: var(--muted); }
    .answer-input-row { display: flex; gap: 8px; }
    .answer-input {
      flex: 1; padding: 9px 13px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 0.9rem; font-family: inherit; outline: none;
      transition: border-color 0.15s; letter-spacing: 0.04em;
    }
    .answer-input:focus { border-color: var(--accent-dim); }
    .answer-input::placeholder { color: var(--muted); }
    .answer-grid { display: flex; gap: 6px; flex-wrap: wrap; }
    .ans-chip {
      padding: 5px 12px; border-radius: 6px;
      font-size: 0.85rem; font-weight: 600; border: 1px solid;
    }
    .ans-chip.correct { color: var(--green);  border-color: rgba(75,232,154,0.4); background: rgba(75,232,154,0.1); }
    .ans-chip.wrong   { color: var(--red);    border-color: rgba(232,75,75,0.4);  background: rgba(232,75,75,0.1); }
    .ans-chip.missing { color: var(--muted);  border-color: var(--border);        background: var(--surface2); }

    .result-screen {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .result-screen h2 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .result-notes {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 480px;
    }
    .result-note {
      padding: 6px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.92rem;
      font-weight: 600;
    }

    footer {
      grid-column: 1 / -1;
      padding: 14px 28px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
    footer a:hover { color: var(--text); }

    .scale-notes {
      display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px;
    }
    .scale-note {
      padding: 3px 7px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
      font-size: 0.68rem; font-weight: 600; color: var(--text);
    }

    @media (max-width: 640px) {
      body { grid-template-columns: 1fr; }
      aside { border-right: none; border-bottom: 1px solid var(--border); }
      main { padding: 28px 16px; }
    }
  </style>
</head>
<body>

<header>
  <a href="../index.html">← Exp Lab</a>
  <h1>Melodic Dictation</h1>
</header>

<aside>
  <div class="cfg-section">
    <div class="cfg-label">Note da generare</div>
    <input type="range" id="num-notes" min="1" max="12" value="5">
    <div class="range-labels"><span>1</span><span id="num-notes-val">5</span><span>12</span></div>
  </div>

  <div class="cfg-section">
    <div class="cfg-label">Range note &nbsp;<span id="note-range-label" style="color:var(--text);font-weight:700">E2 – C6</span></div>
    <div class="dual-range-wrap" id="note-range-wrap">
      <div class="dual-range-track"></div>
      <div class="dual-range-fill" id="note-fill"></div>
      <input type="range" id="midi-min" min="40" max="84" value="40">
      <input type="range" id="midi-max" min="40" max="84" value="84">
    </div>
    <div class="range-labels"><span>E2</span><span>C6</span></div>
  </div>

  <div class="cfg-section">
    <div class="cfg-label">Scala</div>
    <div class="btn-group" id="scale-btns">
      <button class="active" data-mode="free">Libera</button>
      <button data-mode="major">Maggiore</button>
      <button data-mode="minor">Minore</button>
    </div>
    <div id="tonic-section" style="display:none">
      <div class="cfg-label" style="margin-bottom:8px;margin-top:4px">Tonica</div>
      <div class="tonic-grid" id="tonic-grid"></div>
      <div class="scale-notes" id="scale-notes"></div>
    </div>
  </div>

  <div class="cfg-section">
    <div class="toggle-row">
      <span style="font-size:0.85rem">Accordatore</span>
      <label class="toggle">
        <input type="checkbox" id="tuner-toggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>
</aside>

<main id="main"></main>

<footer>
  esperimenti by <a href="https://devinred.com" target="_blank">devinred.com</a>
</footer>

<script>
  const NOTES      = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const MAJOR_MASK = [0, 2, 4, 5, 7, 9, 11];
  const MINOR_MASK = [0, 2, 3, 5, 7, 8, 10];
  const MIDI_MIN   = 40; // E2
  const MIDI_MAX   = 84; // C6

  const midiToFreq = m => 440 * Math.pow(2, (m - 69) / 12);
  const midiToName = m => NOTES[((m % 12) + 12) % 12] + (Math.floor(m / 12) - 1);

  let cfg = { numNotes: 5, midiMin: 40, midiMax: 84, scaleMode: 'free', tonic: 0, tunerOn: true };
  let sequence = [], phase = 'start';
  let seqPlaying = false;

  // --- Audio ---
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function karplusStrong(freq, duration, ctx) {
    const sr   = ctx.sampleRate;
    const N    = Math.max(1, Math.round(sr / freq));
    const total = Math.round(duration * sr);
    const ks   = new Float32Array(N);
    for (let i = 0; i < N; i++) ks[i] = Math.random() * 2 - 1;
    const out  = new Float32Array(total);
    for (let i = 0; i < total; i++) {
      out[i] = ks[i % N];
      ks[i % N] = 0.996 * 0.5 * (ks[i % N] + ks[(i + 1) % N]);
    }
    const buf = ctx.createBuffer(1, total, sr);
    buf.getChannelData(0).set(out);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    return src;
  }

  function playNote(freq) {
    const ctx  = getAudioCtx();
    const gain = ctx.createGain();
    gain.gain.value = 0.5;
    gain.connect(ctx.destination);
    const src = karplusStrong(freq, 3.0, ctx);
    src.connect(gain);
    src.start();
    return src;
  }

  // --- Tuner (YIN autocorrelation + mic) ---
  let micStream = null, micCtx = null, micAnalyser = null, micBuf = null, tunerRaf = null;

  async function startTuner() {
    if (!cfg.tunerOn || micStream) return;
    try {
      micStream   = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      micCtx      = new (window.AudioContext || window.webkitAudioContext)();
      micAnalyser = micCtx.createAnalyser();
      micAnalyser.fftSize = 2048;
      micBuf      = new Float32Array(micAnalyser.fftSize);
      micCtx.createMediaStreamSource(micStream).connect(micAnalyser);
      tunerRaf    = requestAnimationFrame(tunerLoop);
    } catch(e) {
      console.warn('Mic unavailable:', e);
    }
  }

  function stopTuner() {
    if (tunerRaf)   { cancelAnimationFrame(tunerRaf); tunerRaf = null; }
    if (micStream)  { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (micCtx)     { micCtx.close(); micCtx = null; }
    micAnalyser = null;
    micBuf      = null;
  }

  function rms(buf) {
    let s = 0;
    for (let i = 0; i < buf.length; i++) s += buf[i] * buf[i];
    return Math.sqrt(s / buf.length);
  }

  function yin(buf, sr) {
    const half = Math.floor(buf.length / 2);
    const d    = new Float32Array(half);
    for (let tau = 1; tau < half; tau++) {
      for (let i = 0; i < half; i++) {
        const diff = buf[i] - buf[i + tau];
        d[tau] += diff * diff;
      }
    }
    d[0] = 1;
    let runSum = 0;
    for (let tau = 1; tau < half; tau++) {
      runSum += d[tau];
      d[tau] *= tau / runSum;
    }
    let tau = 2;
    while (tau < half) {
      if (d[tau] < 0.1) {
        while (tau + 1 < half && d[tau + 1] < d[tau]) tau++;
        break;
      }
      tau++;
    }
    if (tau === half || d[tau] >= 0.5) return -1;
    if (tau > 1 && tau < half - 1) {
      const denom = 2 * (2 * d[tau] - d[tau - 1] - d[tau + 1]);
      if (denom !== 0) tau += (d[tau + 1] - d[tau - 1]) / denom;
    }
    return sr / tau;
  }

  // Cents from detectedFreq to targetFreq, octave-equivalent ([-600, 600])
  function octaveCents(detectedFreq, targetFreq) {
    let c = 1200 * Math.log2(detectedFreq / targetFreq);
    c = c % 1200;
    if (c > 600) c -= 1200;
    if (c < -600) c += 1200;
    return c;
  }

  function tunerLoop() {
    if (!micAnalyser) return;
    micAnalyser.getFloatTimeDomainData(micBuf);
    const canvas = document.getElementById('tuner-canvas');
    if (!canvas) { tunerRaf = requestAnimationFrame(tunerLoop); return; }
    const ctx2 = canvas.getContext('2d');
    const proxEl = document.getElementById('prox-list');

    const idle = phase !== 'reproduce' || rms(micBuf) < 0.012;
    if (idle) {
      drawNeedle(ctx2, null, canvas.width, canvas.height);
      if (proxEl) proxEl.innerHTML = '';
      tunerRaf = requestAnimationFrame(tunerLoop);
      return;
    }
    const freq = yin(micBuf, micCtx.sampleRate);
    if (freq < 0) {
      drawNeedle(ctx2, null, canvas.width, canvas.height);
      if (proxEl) proxEl.innerHTML = '';
      tunerRaf = requestAnimationFrame(tunerLoop);
      return;
    }

    // Compute proximity to every note in the sequence
    const proximities = sequence
      .map((n, i) => ({ idx: i + 1, cents: octaveCents(freq, n.freq) }))
      .sort((a, b) => Math.abs(a.cents) - Math.abs(b.cents));

    const best = proximities[0];
    drawNeedle(ctx2, Math.max(-60, Math.min(60, best.cents)), canvas.width, canvas.height);

    if (proxEl) {
      proxEl.innerHTML = proximities.slice(0, 3).map(p => {
        const abs = Math.abs(p.cents);
        const cls = abs < 15 ? 'green' : abs < 40 ? 'yellow' : 'red';
        const sign = p.cents >= 0 ? '+' : '';
        return `<span class="prox-chip ${cls}">${p.idx} → ${sign}${Math.round(p.cents)}c</span>`;
      }).join('');
    }
    tunerRaf = requestAnimationFrame(tunerLoop);
  }

  function drawNeedle(ctx2, cents, W, H) {
    ctx2.clearRect(0, 0, W, H);
    const pad = 20, mid = W / 2, cy = H / 2;
    // track
    ctx2.fillStyle = '#1e1e1e';
    ctx2.fillRect(pad, cy - 3, W - pad * 2, 6);
    // zone ticks
    ctx2.strokeStyle = '#333';
    ctx2.lineWidth = 1;
    [-40, -15, 15, 40].forEach(c => {
      const x = mid + (c / 60) * (mid - pad);
      ctx2.beginPath();
      ctx2.moveTo(x, cy - 7);
      ctx2.lineTo(x, cy + 7);
      ctx2.stroke();
    });
    // center line
    ctx2.fillStyle = '#555';
    ctx2.fillRect(mid - 1, cy - 12, 2, 24);
    // needle dot
    if (cents === null) {
      ctx2.fillStyle = '#333';
      ctx2.beginPath();
      ctx2.arc(mid, cy, 7, 0, Math.PI * 2);
      ctx2.fill();
      return;
    }
    const x     = mid + (cents / 60) * (mid - pad);
    const color = Math.abs(cents) < 15 ? '#4be89a' : Math.abs(cents) < 40 ? '#e8c34b' : '#e84b4b';
    ctx2.shadowBlur  = 10;
    ctx2.shadowColor = color;
    ctx2.fillStyle   = color;
    ctx2.beginPath();
    ctx2.arc(x, cy, 8, 0, Math.PI * 2);
    ctx2.fill();
    ctx2.shadowBlur = 0;
  }

  // --- Note generation ---
  function buildPool() {
    const pool = [];
    for (let midi = cfg.midiMin; midi <= cfg.midiMax; midi++) {
      const chroma = midi % 12;
      if (cfg.scaleMode !== 'free') {
        const mask = cfg.scaleMode === 'major' ? MAJOR_MASK : MINOR_MASK;
        if (!mask.includes((chroma - cfg.tonic + 12) % 12)) continue;
      }
      pool.push({ label: midiToName(midi), chroma, freq: midiToFreq(midi), midi });
    }
    return pool;
  }

  function generateSequence() {
    const pool = buildPool();
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, cfg.numNotes);
  }

  // Play all notes in sequence with gaps; highlight dot idx while playing
  function playSequence(onDone) {
    if (seqPlaying) return;
    seqPlaying = true;
    let i = 0;
    const step = () => {
      if (i >= sequence.length) { seqPlaying = false; onDone && onDone(); return; }
      // highlight current dot
      document.querySelectorAll('.seq-dot').forEach((d, k) =>
        d.classList.toggle('active', k === i));
      playNote(sequence[i].freq);
      i++;
      setTimeout(step, 900);
    };
    setTimeout(step, 80);
  }

  // --- Render ---
  const mainEl = () => document.getElementById('main');

  function seqDotsHTML() {
    return sequence.map((_, i) =>
      `<div class="seq-dot" data-i="${i}">${i + 1}</div>`).join('');
  }

  function renderStart() {
    phase = 'start';
    mainEl().innerHTML = `
      <div class="start-screen">
        <h2>Melodic Dictation</h2>
        <p>Configura le opzioni e premi Start. L'app suonerà una melodia — ascoltala, poi riproducila.</p>
        <button class="btn-action primary" id="btn-start" style="max-width:200px">Inizia</button>
      </div>`;
    document.getElementById('btn-start').onclick = startGame;
  }

  function renderListen() {
    phase = 'listen';
    seqPlaying = false;
    mainEl().innerHTML = `
      <div class="seq-display">
        <div class="cfg-label">Melodia — ${sequence.length} note</div>
        <div class="seq-dots">${seqDotsHTML()}</div>
        <button class="btn-play" id="btn-listen" title="Ascolta sequenza">&#9654;</button>
      </div>
      <div class="controls">
        <button class="btn-action" id="btn-restart">Ricomincia</button>
        <button class="btn-action primary" id="btn-reproduce">Riproduci &rarr;</button>
      </div>`;

    const listenBtn = document.getElementById('btn-listen');
    listenBtn.onclick = () => {
      listenBtn.classList.add('playing');
      setTimeout(() => listenBtn.classList.remove('playing'), 600);
      playSequence(() => {
        document.querySelectorAll('.seq-dot').forEach(d => d.classList.remove('active'));
      });
    };
    document.getElementById('btn-reproduce').onclick = renderReproduce;
    document.getElementById('btn-restart').onclick   = startGame;

    // Auto-play on first render
    setTimeout(() => listenBtn.click(), 200);
  }

  function renderReproduce() {
    phase = 'reproduce';
    const placeholder = sequence.map(() => '?').join(' ');
    mainEl().innerHTML = `
      ${cfg.tunerOn ? `
      <div class="tuner-card" style="width:100%;max-width:480px">
        <div class="tuner-label">Accordatore — vicino a:</div>
        <canvas id="tuner-canvas" width="440" height="64"></canvas>
        <div class="proximity-list" id="prox-list"></div>
      </div>` : ''}
      <div class="answer-section">
        <div class="cfg-label">Scrivi la sequenza (${sequence.length} note)</div>
        <div class="answer-hint">Nomi nota senza ottava, separati da spazio &nbsp;·&nbsp; es: <em>C D# F G A</em></div>
        <div class="answer-input-row">
          <input class="answer-input" id="answer-input" type="text"
            placeholder="${placeholder}" autocomplete="off" spellcheck="false">
          <button class="btn-action primary" id="btn-verify" style="flex:0;padding:9px 18px">Verifica</button>
        </div>
        <div class="answer-grid" id="answer-grid"></div>
      </div>
      <div class="controls">
        <button class="btn-action" id="btn-back">&#9664; Riascolta</button>
        <button class="btn-action" id="btn-reveal-seq">Rivela</button>
        <button class="btn-action" id="btn-restart">Nuova</button>
      </div>`;

    document.getElementById('btn-back').onclick    = renderListen;
    document.getElementById('btn-restart').onclick = startGame;
    document.getElementById('btn-reveal-seq').onclick = () => {
      grid.innerHTML = sequence.map(n =>
        `<span class="ans-chip correct">${n.label}</span>`).join('');
      input.value = sequence.map(n => NOTES[n.chroma]).join(' ');
    };

    const input   = document.getElementById('answer-input');
    const grid    = document.getElementById('answer-grid');
    const verBtn  = document.getElementById('btn-verify');

    const NOTE_MAP = {
      'CB':11,'C':0,'C#':1,'DB':1,'D':2,'D#':3,'EB':3,'E':4,'E#':5,
      'FB':4,'F':5,'F#':6,'GB':6,'G':7,'G#':8,'AB':8,'A':9,'A#':10,
      'BB':10,'B':11,'B#':0
    };
    const parseNote = s => { const v = NOTE_MAP[s.trim().toUpperCase()]; return v !== undefined ? v : -1; };

    verBtn.onclick = () => {
      const tokens = input.value.trim().split(/\s+/).filter(Boolean);
      grid.innerHTML = sequence.map((n, i) => {
        const given = tokens[i] || '';
        if (!given) return `<span class="ans-chip missing">?</span>`;
        const givenChroma = parseNote(given);
        const ok = givenChroma === n.chroma;
        const correct = NOTES[n.chroma];
        return `<span class="ans-chip ${ok ? 'correct' : 'wrong'}"
          title="${ok ? n.label : 'Corretto: ' + correct}">${ok ? n.label : given + ' ✗'}</span>`;
      }).join('') + (tokens.length > sequence.length
        ? `<span class="answer-hint" style="align-self:center;margin-left:4px">+${tokens.length - sequence.length} extra</span>` : '');
    };

    // Allow Enter to verify
    input.addEventListener('keydown', e => { if (e.key === 'Enter') verBtn.click(); });

    if (cfg.tunerOn && !micStream) startTuner();
  }

  function startGame() {
    if (buildPool().length === 0) {
      alert('Nessuna nota disponibile nel range selezionato. Allarga il range o cambia scala.');
      return;
    }
    sequence   = generateSequence();
    seqPlaying = false;
    renderListen();
    if (cfg.tunerOn && !micStream) startTuner();
  }

  // --- Config wiring ---
  (function initConfig() {
    // Num notes
    const numEl  = document.getElementById('num-notes');
    const numVal = document.getElementById('num-notes-val');
    numEl.oninput = () => { cfg.numNotes = +numEl.value; numVal.textContent = cfg.numNotes; };

    // Dual MIDI range (E2=40 … C6=84)
    const minEl   = document.getElementById('midi-min');
    const maxEl   = document.getElementById('midi-max');
    const fillEl  = document.getElementById('note-fill');
    const labelEl = document.getElementById('note-range-label');
    const span    = MIDI_MAX - MIDI_MIN;

    function syncNoteRange() {
      let lo = +minEl.value, hi = +maxEl.value;
      if (lo > hi) {
        if (document.activeElement === minEl) { lo = hi; minEl.value = lo; }
        else                                  { hi = lo; maxEl.value = hi; }
      }
      cfg.midiMin = lo; cfg.midiMax = hi;
      const pctLo = (lo - MIDI_MIN) / span * 100;
      const pctHi = (hi - MIDI_MIN) / span * 100;
      fillEl.style.left  = pctLo + '%';
      fillEl.style.width = (pctHi - pctLo) + '%';
      labelEl.textContent = `${midiToName(lo)} – ${midiToName(hi)}`;
    }
    minEl.oninput = syncNoteRange;
    maxEl.oninput = syncNoteRange;
    syncNoteRange();

    function updateScaleDisplay() {
      const el = document.getElementById('scale-notes');
      if (!el) return;
      if (cfg.scaleMode === 'free') { el.innerHTML = ''; return; }
      const mask = cfg.scaleMode === 'major' ? MAJOR_MASK : MINOR_MASK;
      el.innerHTML = mask.map(iv =>
        `<span class="scale-note">${NOTES[(cfg.tonic + iv) % 12]}</span>`
      ).join('');
    }

    // Scale mode
    document.getElementById('scale-btns').onclick = e => {
      const btn = e.target.closest('button[data-mode]');
      if (!btn) return;
      cfg.scaleMode = btn.dataset.mode;
      document.querySelectorAll('#scale-btns button').forEach(b =>
        b.classList.toggle('active', b === btn));
      document.getElementById('tonic-section').style.display =
        cfg.scaleMode === 'free' ? 'none' : 'block';
      updateScaleDisplay();
    };

    // Tonic
    const tonicGrid = document.getElementById('tonic-grid');
    NOTES.forEach((n, i) => {
      const btn = document.createElement('button');
      btn.textContent = n;
      if (i === cfg.tonic) btn.classList.add('active');
      btn.onclick = () => {
        cfg.tonic = i;
        tonicGrid.querySelectorAll('button').forEach((b, j) =>
          b.classList.toggle('active', j === i));
        updateScaleDisplay();
      };
      tonicGrid.appendChild(btn);
    });

    // Tuner toggle
    document.getElementById('tuner-toggle').onchange = e => {
      cfg.tunerOn = e.target.checked;
      if (!cfg.tunerOn) stopTuner();
      else if (phase === 'reproduce') startTuner();
    };
  })();

  renderStart();
</script>
</body>
</html>
